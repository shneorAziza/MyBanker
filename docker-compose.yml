version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg15
    container_name: my_banker_db
    environment:
      POSTGRES_USER: banker_user
      POSTGRES_PASSWORD: banker_pass
      POSTGRES_DB: my_banker
    ports:
      - "5432:5432"
    volumes:
      - banker_data:/var/lib/postgresql/data

volumes:
  banker_data: